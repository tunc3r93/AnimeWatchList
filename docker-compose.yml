version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: anime-watchlist-db
    environment:
      POSTGRES_DB: anime_watchlist
      POSTGRES_USER: watchlist_user
      POSTGRES_PASSWORD: secure_password_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - anime-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watchlist_user -d anime_watchlist"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: anime-watchlist-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - anime-network

networks:
  anime-network:
    driver: bridge

volumes:
  postgres_data:
