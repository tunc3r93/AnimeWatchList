spring:
  application:
    name: anime-watchlist-api

  datasource:
    url: jdbc:postgresql://localhost:5432/anime_watchlist
    username: watchlist_user
    password: secure_password_123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
          fetch_size: 50
    show-sql: false
    open-in-view: false

  web:
    cors:
      allowed-origins: "http://localhost:3000,http://localhost:5173,http://localhost:5174"
      allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
      allowed-headers: "*"
      allow-credentials: true
      max-age: 3600

server:
  port: 8080
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-min-32-chars-long-for-HS256-CHANGE-IN-PROD}
    accessTokenExpiryMs: 900000
    refreshTokenExpiryMs: 2592000000

logging:
  level:
    root: INFO
    com.animewatch: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
